name: ci

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # addons-linter (web-ext lint) is unstable on very new Node builds
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run coverage # vitest run --coverage — enforces the gate.ts/templates.ts thresholds
      - run: npm run build
      - run: npm run lint:ext # web-ext lint against the built dist/
