<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>expurge</title>
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1 class="xpg-wordmark">ex<span class="xpg-strip">pur</span>ge</h1>
    </header>

    <!-- No active run -->
    <div id="popup-no-run" class="hidden">
      <p class="note">No active scan.</p>
      <button id="btn-open-dashboard" class="btn-primary">Open dashboard</button>
    </div>

    <!-- Active run -->
    <div id="popup-active" class="hidden">
      <p id="popup-progress" class="run-progress"></p>
      <div class="popup-actions">
        <button id="btn-stop-run" class="btn-quiet">Stop</button>
      </div>
      <button id="btn-open-dashboard-active" class="btn-primary">Dashboard →</button>
    </div>

    <!-- Run done -->
    <div id="popup-done" class="hidden">
      <p id="popup-done-summary" class="run-progress"></p>
      <button id="btn-open-dashboard-done" class="btn-primary">View results</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
